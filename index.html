<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flow · background</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      margin: 0;
      overflow-x: hidden;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: auto;
    }

    #bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(12px);
      transition: filter 0.4s ease;
      display: block;
      pointer-events: auto;
    }

    #bg-video:hover {
      filter: blur(0);
    }

    .click-shield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.3s;
      opacity: 1;
      pointer-events: auto;
    }

    .click-shield.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .shield-message {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.8rem;
      font-weight: 600;
      color: #c8ff00;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      text-shadow: 0 0 20px rgba(200, 255, 0, 0.4);
      background: rgba(10, 10, 10, 0.4);
      padding: 0.8rem 2.5rem;
      border: 1px solid rgba(200, 255, 0, 0.5);
      border-radius: 40px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: pulseGlow 2.2s infinite;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 5px #c8ff00; }
      50% { box-shadow: 0 0 25px #c8ff00, 0 0 10px #7fff9e; }
      100% { box-shadow: 0 0 5px #c8ff00; }
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      background: rgba(13, 13, 13, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }

    .card-banner {
      height: 6px;
      background: linear-gradient(90deg, #c8ff00 0%, #7fff9e 50%, #c8ff00 100%);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body { padding: 28px 28px 24px; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 3px;
      background: #151515;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #c8ff00;
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 2px;
      display: block;
    }

    .avatar::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 10px; height: 10px;
      border-top: 2px solid #c8ff00;
      border-left: 2px solid #c8ff00;
    }

    .avatar::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 10px; height: 10px;
      border-bottom: 2px solid #c8ff00;
      border-right: 2px solid #c8ff00;
    }

    .header-text { flex: 1; }

    .tag-line {
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .name span { color: #c8ff00; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(200,255,0,0.07);
      border: 1px solid rgba(200,255,0,0.2);
      border-radius: 2px;
      padding: 2px 8px;
      font-size: 10px;
      color: #c8ff00;
      letter-spacing: 0.1em;
    }

    .rank-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c8ff00;
      animation: blink 1.6s ease infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin-bottom: 20px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #1a1a1a;
      border: 1px solid #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(13, 13, 13, 0.9);
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 9px;
      color: #7a7a7a;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #c8c8c8;
      letter-spacing: 0.04em;
    }

    .stat-value.accent { color: #c8ff00; }

    .bio {
      font-size: 11px;
      color: #8a8a8a;
      letter-spacing: 0.06em;
      line-height: 1.9;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    .bio span { color: #aaa; }

    .links { display: flex; gap: 8px; }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
    }

    .link-btn:hover {
      border-color: #c8ff00;
      color: #c8ff00;
      background: rgba(200,255,0,0.04);
    }

    .link-btn svg {
      width: 12px; height: 12px;
      fill: currentColor;
      opacity: 0.8;
    }

    .link-btn.primary { border-color: #c8ff00; color: #c8ff00; }

    .now-playing {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(8, 8, 8, 0.7);
      backdrop-filter: blur(4px);
      border-top: 1px solid #2a2a2a;
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .now-playing:hover { background: rgba(20, 20, 20, 0.8); }

    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      flex-shrink: 0;
    }

    .bar {
      width: 3px;
      border-radius: 1px;
      background: #c8ff00;
      opacity: 0.5;
      height: 4px;
    }

    .bar.playing { animation: eq 0.7s ease infinite alternate; }
    .bar:nth-child(1) { animation-duration: 0.6s; }
    .bar:nth-child(2) { animation-duration: 0.9s; }
    .bar:nth-child(3) { animation-duration: 0.5s; }
    .bar:nth-child(4) { animation-duration: 0.8s; }

    @keyframes eq {
      from { height: 3px; }
      to { height: 14px; }
    }

    .song {
      flex: 1;
      font-size: 10px;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song span { color: #bbb; }

    .play-icon {
      font-size: 10px;
      color: #c8ff00;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .overlay.open { display: flex; }
    .popup {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 28px;
      width: 280px;
      position: relative;
    }
    .popup-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #5865F2, #7289da);
      border-radius: 4px 4px 0 0;
    }
    .popup-label {
      font-size: 9px;
      color: #aaa;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 14px;
      margin-top: 8px;
    }
    .popup-discord {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .discord-icon {
      width: 36px;
      height: 36px;
      background: #5865F2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .discord-icon svg { width: 20px; height: 20px; fill: white; }
    .discord-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      letter-spacing: 0.04em;
    }
    .discord-sub {
      font-size: 9px;
      color: #7a7a7a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .popup-close {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid #333;
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .popup-close:hover { border-color: #888; color: #ddd; }
  </style>
</head>
<body>

  <div class="video-background">
    <video id="bg-video" loop preload="auto" playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <div class="click-shield" id="clickShield">
    <div class="shield-message">▶ click anywhere</div>
  </div>

  <div class="card">
    <div class="card-banner"></div>
    <div class="card-body">

      <div class="card-header">
        <div class="avatar">
          <img src="avatar.png" alt="flow" onerror="this.style.display='none';this.parentElement.textContent='F'">
        </div>
        <div class="header-text">
          <div class="tag-line">player profile</div>
          <div class="name">fl<span>ow</span></div>
          <div class="rank-badge">
            <div class="rank-dot"></div>
            online
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="stat-grid">
        <div class="stat">
          <div class="stat-label">Location</div>
          <div class="stat-value">Belgium</div>
        </div>
        <div class="stat">
          <div class="stat-label">Skin Colour</div>
          <div class="stat-value accent">White</div>
        </div>
        <div class="stat">
          <div class="stat-label">Timezone</div>
          <div class="stat-value">CET+1</div>
        </div>
        <div class="stat">
          <div class="stat-label">Local time</div>
          <div class="stat-value accent" id="localtime">--:--:--</div>
        </div>
      </div>

      <div class="bio">
        <span>Developer from Belgium</span><br>
        AI enthusiast & cloud infrastructure.
      </div>

      <div class="links">
        <a href="https://github.com/xehh0" target="_blank" class="link-btn primary">
          <svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          github
        </a>
        <button onclick="document.getElementById('overlay').classList.add('open')" class="link-btn">contact</button>
      </div>
    </div>

    <div class="now-playing" id="nowPlayingBar">
      <div class="eq-bars">
        <div class="bar" id="b1"></div>
        <div class="bar" id="b2"></div>
        <div class="bar" id="b3"></div>
        <div class="bar" id="b4"></div>
      </div>
      <div class="song"><span id="play-label">paused</span></div>
      <div class="play-icon" id="play-icon">▶</div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="popup">
      <div class="popup-banner"></div>
      <div class="popup-label">contact</div>
      <div class="popup-discord">
        <div class="discord-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        </div>
        <div class="discord-info">
          <div class="discord-name">flowlyte.</div>
          <div class="discord-sub">discord username</div>
        </div>
      </div>
      <button class="popup-close" onclick="document.getElementById('overlay').classList.remove('open')">close</button>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      function updateClock() {
        const now = new Date();
        const cet = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Brussels' }));
        const h = String(cet.getHours()).padStart(2,'0');
        const m = String(cet.getMinutes()).padStart(2,'0');
        const s = String(cet.getSeconds()).padStart(2,'0');
        document.getElementById('localtime').textContent = h + ':' + m + ':' + s;
      }
      updateClock();
      setInterval(updateClock, 1000);

      const video = document.getElementById('bg-video');
      const clickShield = document.getElementById('clickShield');
      const playLabel = document.getElementById('play-label');
      const playIcon = document.getElementById('play-icon');
      const bars = ['b1','b2','b3','b4'].map(id => document.getElementById(id));

      function setPlayingState(isPlaying) {
        if (isPlaying) {
          bars.forEach(b => b.classList.add('playing'));
          playIcon.textContent = '❚❚';
          playLabel.textContent = 'now playing';
        } else {
          bars.forEach(b => b.classList.remove('playing'));
          playIcon.textContent = '▶';
          playLabel.textContent = 'paused';
        }
      }

      video.addEventListener('play', () => setPlayingState(true));
      video.addEventListener('pause', () => setPlayingState(false));
      video.addEventListener('ended', () => setPlayingState(false));

      function toggleVideoPlayback() {
        if (video.paused) {
          video.play().catch(e => {});
        } else {
          video.pause();
        }
      }

      document.getElementById('nowPlayingBar').addEventListener('click', (e) => {
        toggleVideoPlayback();
      });

      function activateVideoAndHideShield() {
        if (!video.paused) return; 

        video.play().then(() => {
          clickShield.classList.add('hidden');
          setPlayingState(true);
        }).catch(err => {
          clickShield.classList.add('hidden');
          video.muted = false; 
          video.play().catch(() => {});
        });
      }

      clickShield.addEventListener('click', activateVideoAndHideShield);

      video.load();

      if (!video.paused) {
        clickShield.classList.add('hidden');
        setPlayingState(true);
      }

      video.addEventListener('play', () => {
        if (!clickShield.classList.contains('hidden')) {
          clickShield.classList.add('hidden');
        }
      });

      if (video.paused) {
        setPlayingState(false);
      }

      video.loop = true;

      video.addEventListener('error', () => {
        console.warn('video.mp4 not found or unsupported — background remains static.');
      });

    })();
  </script>
</body>
</html>
